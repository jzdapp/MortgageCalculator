        :root {

            --white: #ffffff;

            --border: #e1e8ed;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* header 样式已调整，不再包含标题 */

        /* 悬浮返回按钮样式 */
        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #0a84ff;
            color: white;
            text-align: center;
            line-height: 50px;
            font-size: 24px;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }
        
        .back-button:hover {
            background-color: #0066cc;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .detail-content {
            background-color: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-top: 20px; /* 增加顶部边距以保持页面平衡 */
        }

        .detail-content h2 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--secondary);
        }

        .detail-content h3 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .detail-content h4 {
            color: var(--primary);
            font-size: 1.2rem;
            margin-top: 25px;
            margin-bottom: 10px;
        }

            margin-bottom: 20px;
            text-align: justify;
        }

        .detail-content ul {
            margin-bottom: 20px;
            padding-left: 20px;
        }

        .detail-content li {
            margin-bottom: 10px;
        }

        .detail-content li:last-child {
            margin-bottom: 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            header h1 {
                font-size: 2rem;
            }

                padding: 20px;
            }

            }

        // 获取URL参数
        function getURLParams() {
            const params = {};
            const queryString = window.location.search.substring(1);
            const pairs = queryString.split('&');
            
            for (let i = 0; i < pairs.length; i++) {
                const pair = pairs[i].split('=');
                params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
            }
            
            return params;
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            const params = getURLParams();
            const tab = params.tab || 'new-house';
            const step = params.step || '1.1';
            
            const detailInfo = document.getElementById('detail-info');
            
            // 检查是否存在对应的内容
            if (detailedContent[tab] && detailedContent[tab][step]) {
                const content = detailedContent[tab][step];
                
                // 更新页面标题
                document.title = content.title;
                
                detailInfo.innerHTML = `
                    ${content.content}
                `;
            } else {
                // 更新页面标题
                document.title = '找不到内容';
                
                detailInfo.innerHTML = `
                    <p>很抱歉，无法找到您请求的内容。请返回购房流程图页面，重新选择一个步骤。</p>
                `;
            }
        });
    </script>
